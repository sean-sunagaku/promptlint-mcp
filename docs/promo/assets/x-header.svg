<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500">
  <defs>
    <linearGradient id="hbg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="0.6" stop-color="#161b22"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>
  </defs>
  <rect width="1500" height="500" fill="url(#hbg)"/>

  <!-- subtle vertical lines (terminal feel) -->
  <g stroke="#21262d" stroke-width="1" opacity="0.5">
    <line x1="0" y1="60"   x2="1500" y2="60"/>
    <line x1="0" y1="440"  x2="1500" y2="440"/>
  </g>

  <!-- left: brand -->
  <g transform="translate(96 188)">
    <text x="0" y="0"
          font-family="ui-monospace, 'SF Mono', Menlo, monospace"
          font-size="120" font-weight="800" fill="#3fb950" letter-spacing="-4">&gt;_</text>
    <text x="0" y="58"
          font-family="ui-sans-serif, -apple-system, 'Inter', system-ui, sans-serif"
          font-size="34" font-weight="800" fill="#e6edf3" letter-spacing="-1">promptlint</text>
    <text x="0" y="92"
          font-family="ui-sans-serif, -apple-system, 'Inter', system-ui, sans-serif"
          font-size="20" font-weight="500" fill="#8b949e">lint AI prompts like code</text>
  </g>

  <!-- right: 3 score badges -->
  <g transform="translate(880 200)" font-family="ui-monospace, 'SF Mono', Menlo, monospace">
    <g>
      <rect width="160" height="60" rx="8" fill="#0d1117" stroke="#f85149" stroke-width="2"/>
      <text x="80" y="26" font-size="11" fill="#f85149" text-anchor="middle">CONTRADICTION</text>
      <text x="80" y="48" font-size="22" font-weight="800" fill="#f85149" text-anchor="middle">14/100</text>
    </g>
    <g transform="translate(180 0)">
      <rect width="160" height="60" rx="8" fill="#0d1117" stroke="#d29922" stroke-width="2"/>
      <text x="80" y="26" font-size="11" fill="#d29922" text-anchor="middle">FLUFF (-16%)</text>
      <text x="80" y="48" font-size="22" font-weight="800" fill="#d29922" text-anchor="middle">62/100</text>
    </g>
    <g transform="translate(360 0)">
      <rect width="160" height="60" rx="8" fill="#0d1117" stroke="#3fb950" stroke-width="2"/>
      <text x="80" y="26" font-size="11" fill="#3fb950" text-anchor="middle">CLEAN PROMPT</text>
      <text x="80" y="48" font-size="22" font-weight="800" fill="#3fb950" text-anchor="middle">100/100</text>
    </g>
  </g>

  <!-- footer URL -->
  <text x="750" y="468"
        font-family="ui-sans-serif, system-ui, sans-serif"
        font-size="18" font-weight="600" fill="#7d8590" text-anchor="middle">github.com/sean-sunagaku/promptlint-mcp · CLI + MCP server · MIT</text>
</svg>
