<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Logo + product name -->
  <g transform="translate(72 76)">
    <rect width="80" height="80" rx="16" fill="#0d1117" stroke="#3fb950" stroke-width="3"/>
    <text x="12" y="58"
          font-family="ui-monospace, 'SF Mono', Menlo, monospace"
          font-size="48" font-weight="800" fill="#3fb950" letter-spacing="-2">&gt;_</text>
    <text x="100" y="40"
          font-family="ui-sans-serif, -apple-system, 'Inter', system-ui, sans-serif"
          font-size="40" font-weight="800" fill="#e6edf3">promptlint</text>
    <text x="100" y="70"
          font-family="ui-sans-serif, -apple-system, 'Inter', system-ui, sans-serif"
          font-size="18" font-weight="500" fill="#8b949e">Static linter for AI prompts</text>
  </g>

  <!-- Terminal frame -->
  <g transform="translate(72 220)">
    <rect width="1056" height="320" rx="12" fill="#010409" stroke="#30363d" stroke-width="1"/>
    <!-- title bar -->
    <rect width="1056" height="36" rx="12" fill="#161b22"/>
    <rect y="24" width="1056" height="12" fill="#161b22"/>
    <circle cx="20" cy="18" r="6" fill="#ff5f56"/>
    <circle cx="40" cy="18" r="6" fill="#ffbd2e"/>
    <circle cx="60" cy="18" r="6" fill="#27c93f"/>
    <text x="528" y="23"
          font-family="ui-sans-serif, system-ui, sans-serif"
          font-size="14" fill="#7d8590" text-anchor="middle">promptlint examples/bad-prompt.md</text>

    <!-- terminal text -->
    <g font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="20">
      <text x="32" y="80" fill="#7d8590">$ node src/cli.mjs examples/bad-prompt.md</text>
      <text x="32" y="118" fill="#e6edf3">  score  <tspan font-weight="800" fill="#f85149">14</tspan>/100</text>
      <text x="32" y="148" fill="#e6edf3">  tokens 367 → 307 <tspan fill="#3fb950">(-60, 16% saved)</tspan></text>
      <text x="32" y="178" fill="#e6edf3">  issues 14</text>

      <text x="32" y="220" fill="#f85149">  error</text>
      <text x="120" y="220" fill="#7d8590">[contradiction]</text>
      <text x="304" y="220" fill="#e6edf3">"concise" vs "detailed"</text>

      <text x="32" y="252" fill="#f85149">  error</text>
      <text x="120" y="252" fill="#7d8590">[contradiction]</text>
      <text x="304" y="252" fill="#e6edf3">"do not add comments" vs "explain each step"</text>

      <text x="32" y="284" fill="#d29922">  warn</text>
      <text x="120" y="284" fill="#7d8590">[long-example]</text>
      <text x="304" y="284" fill="#e6edf3">code block 783 chars</text>
    </g>
  </g>

  <!-- Footer -->
  <text x="72" y="588"
        font-family="ui-sans-serif, system-ui, sans-serif"
        font-size="22" font-weight="600" fill="#8b949e">CLI + MCP server · zero network · MIT</text>
  <text x="1128" y="588"
        font-family="ui-sans-serif, system-ui, sans-serif"
        font-size="22" font-weight="600" fill="#3fb950" text-anchor="end">github.com/sean-sunagaku/promptlint-mcp</text>
</svg>
